description: >-
  FinOps view of Channex spend. Channex bills on a recurring per-property
  (and per-unit, for vacation rentals) monthly subscription basis rather than
  per-API-call metering. White-label/PMS partners pay a base platform fee plus
  per-property and per-unit fees, typically volume-tiered. Cost scales with the
  number of connected properties/units, not with API request volume.
notes: >-
  Per-property and per-unit fees, volume tiers, and white-label terms are
  negotiated and change over time; verify against Channex pricing and your
  contract during reconciliation.
