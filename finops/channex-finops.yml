meters:
- name: connected_properties
  description: Active hotel properties connected to Channex, billed per property per month.
  unit: properties
  aggregation: max
  dimensions:
  - account
  - property
- name: connected_units
  description: Active vacation-rental units connected to Channex, billed per unit per month.
  unit: units
  aggregation: max
  dimensions:
  - account
  - unit
- name: platform_fee
  description: Recurring white-label platform/base fee for PMS and booking-engine partners.
  unit: months
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track the count of connected properties and vacation-rental units, since spend scales with connections, not API calls.
- name: Allocation
  description: Map properties/units to the underlying hotel customer or internal cost center for white-label resale.
- name: Optimization
  description: Deactivate or remove unused property/channel connections; right-size volume tiers as the connected portfolio grows.
- name: Accountability
  description: Reconcile the active connected-property/unit count against the Channex invoice monthly.
