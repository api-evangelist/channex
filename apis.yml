  - url: https://docs.channex.io/api-v.1-documentation/room-types-collection
    type: Documentation
  - url: openapi/channex-openapi.yml
    type: OpenAPI
  - url: collections/channex.postman_collection.json
    type: PostmanCollection
  - url: collections/channex.opencollection.json
    type: OpenCollection
  description: Manage room types under a property, including counts of rooms, occupancy
    (adults, children, infants), default occupancy, room kind (room or dorm), and content.
- aid: channex:rate-plans
