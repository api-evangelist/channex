  name: Channex Properties API
  tags:
  - Properties
  - Hotels
  - Inventory
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.channex.io/api-v.1-documentation/hotels-collection
  baseURL: https://secure.channex.io/api/v1
  properties:
  - url: https://docs.channex.io/api-v.1-documentation/hotels-collection
    type: Documentation
