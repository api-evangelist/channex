    type: OpenAPI
  - url: collections/channex.postman_collection.json
    type: PostmanCollection
  - url: collections/channex.opencollection.json
    type: OpenCollection
  description: Create, read, update, and delete properties (hotels, apartments, vacation
    rentals) including location, currency, content, photos, facilities, and settings.
- aid: channex:room-types
  name: Channex Room Types API
  tags:
  - Room Types
