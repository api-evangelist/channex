aid: channex
url: https://raw.githubusercontent.com/api-evangelist/channex/refs/heads/main/apis.yml
name: Channex
kind: company
description: Channex is a white-label hotel channel manager API that gives Property
  Management Systems and booking engines a single JSON-based REST integration to distribute
  availability, rates, and restrictions (ARI) to Booking.com, Airbnb, Expedia, and
  50+ other OTAs, and to receive bookings back in real time via webhooks.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Hospitality
- Channel Manager
- Hotel Distribution
- OTA
- Bookings
created: '2026-06-25'
modified: '2026-06-25'
specificationVersion: '0.19'
