  - url: openapi/channex-openapi.yml
    type: OpenAPI
  - url: collections/channex.postman_collection.json
    type: PostmanCollection
  - url: collections/channex.opencollection.json
    type: OpenCollection
  description: Manage pricing plans for room types - sell mode (per room / per person),
    rate mode (manual, derived, auto, cascade), occupancy price options, meal types,
    and stay restrictions.
- aid: channex:availability-restrictions-ari
  name: Channex Availability and Restrictions (ARI) API
